<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marco Marzico — Premium 3D Visualisation Studio</title>
  <meta name="description" content="Cinematic 3D product and automotive animations crafted to bring your brand's vision to life. Experience uncompromised digital art direction and sensory realism." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Inter+Tight:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script>document.documentElement.classList.replace('no-js', 'js-active');</script>
  <style>
    :root {
      --bg: #030712; --surface: #0b0f19; --surface-card: #111827;
      --border: rgba(255,255,255,0.08); --border-hover: rgba(255,255,255,0.16);
      --accent: #6366f1; --accent-glow: rgba(99,102,241,0.15);
      --text: #f9fafb; --text-muted: #9ca3af; --text-dim: #6b7280;
      --font-display: 'Inter Tight', system-ui, sans-serif;
      --font-sans: 'Inter', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 16px; line-height: 1.6; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    img, video { display: block; width: 100%; height: auto; }
    a { color: inherit; text-decoration: none; transition: all 0.2s ease; }
    button { font-family: inherit; color: inherit; border: none; background: none; cursor: pointer; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
    .badge { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2); color: var(--accent); padding: 0.35rem 0.85rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1.5rem; }
    .reveal { opacity: 1; transform: none; }
    .js-active .reveal { opacity: 0; transform: translateY(16px); transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1); }
    .js-active .reveal.visible { opacity: 1; transform: translateY(0); }

    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1.25rem 0; background: rgba(3,7,18,0.7); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); transition: background 0.3s ease; }
    .nav-container { display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; letter-spacing: -0.03em; }
    .nav-logo span { color: var(--accent); }
    .nav-menu { display: flex; align-items: center; gap: 2rem; list-style: none; }
    .nav-menu a { font-size: 0.85rem; font-weight: 500; color: var(--text-muted); }
    .nav-menu a:hover { color: var(--text); }
    .nav-actions { display: flex; align-items: center; gap: 1rem; }
    .btn-sm { font-size: 0.8rem; font-weight: 600; padding: 0.5rem 1rem; border-radius: 6px; }

    #hero { position: relative; min-height: 100vh; display: flex; align-items: center; padding-top: 5rem; overflow: hidden; }
    .dot-grid { position: absolute; inset: 0; pointer-events: none; z-index: 0; background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 24px 24px; mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, #000 40%, transparent 100%); -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, #000 40%, transparent 100%); }
    .glow-sphere { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%); top: 30%; left: 50%; transform: translate(-50%,-50%); pointer-events: none; z-index: 0; }
    .hero-wrapper {
      position: relative; z-index: 1;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      align-items: center;
      min-height: calc(100vh - 5rem);
    }
    .hero-text {
      text-align: left;
      padding: 3rem 0;
    }
    .hero-text .badge { margin-bottom: 1.5rem; }
    .hero-model-side {
      position: relative;
      height: 100vh;
      max-height: 900px;
      min-height: 600px;
      display: flex;
      align-items: stretch;
    }
    .hero-headline { font-family: var(--font-display); font-size: clamp(2.2rem,4.5vw,4.2rem); font-weight: 800; line-height: 1.08; letter-spacing: -0.035em; margin-bottom: 1.5rem; }
    .hero-headline em { font-style: normal; font-weight: 800; background: linear-gradient(135deg,#a5b4fc 0%,#6366f1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .hero-model-container { width: 100%; height: 100%; position: relative; display: flex; justify-content: center; align-items: center; z-index: 5; cursor: grab; }
    .hero-model-container:active { cursor: grabbing; }
    #heroModelCanvas { position: absolute; inset: 0; width: 100% !important; height: 100% !important; outline: none; display: block; }
    .model-loader { position: absolute; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 0.75rem; color: var(--text-dim); font-size: 0.8rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; transition: opacity 0.6s ease; pointer-events: none; }
    .model-loader.hidden { opacity: 0; }
    .model-hint { position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%); font-size: 0.72rem; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; opacity: 0; transition: opacity 1s ease; pointer-events: none; white-space: nowrap; }
    .model-hint.visible { opacity: 1; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }

    .hero-sub { font-size: 1.05rem; font-weight: 300; color: var(--text-muted); max-width: 480px; margin: 0 0 2.5rem; }
    .hero-buttons { display: flex; gap: 1rem; justify-content: flex-start; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 8px; transition: all 0.2s cubic-bezier(0.16,1,0.3,1); }
    .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 20px rgba(99,102,241,0.25); }
    .btn-primary:hover { background: #4f46e5; transform: translateY(-1px); }
    .btn-secondary { background: var(--surface-card); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: rgba(255,255,255,0.05); border-color: var(--border-hover); }
    .trust-section { margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border); }
    .trust-title { font-size: 0.75rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1.5rem; }
    .trust-logos { display: flex; justify-content: flex-start; align-items: center; gap: 2rem; flex-wrap: wrap; opacity: 0.6; }
    .trust-logos span { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.05em; color: var(--text-muted); }

    #features { padding: 7rem 0; border-top: 1px solid var(--border); background: radial-gradient(100% 50% at 50% 100%, rgba(99,102,241,0.03) 0%, transparent 100%); }
    .section-header { text-align: center; max-width: 650px; margin: 0 auto 4rem; }
    .section-title { font-family: var(--font-display); font-size: clamp(1.8rem,3.5vw,2.6rem); font-weight: 700; line-height: 1.15; letter-spacing: -0.03em; margin-top: 0.5rem; }
    .section-desc { color: var(--text-muted); margin-top: 1rem; }
    .bento-grid { display: grid; grid-template-columns: repeat(12,1fr); gap: 1.5rem; }
    .bento-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2.25rem; position: relative; overflow: hidden; transition: border-color 0.3s ease, box-shadow 0.3s ease; }
    .bento-card:hover { border-color: rgba(99,102,241,0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.2), inset 0 1px 1px rgba(255,255,255,0.05); }
    .bento-icon { width: 42px; height: 42px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--accent); margin-bottom: 1.5rem; }
    .bento-title { font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
    .bento-desc { font-size: 0.9rem; color: var(--text-muted); line-height: 1.6; }
    .col-6 { grid-column: span 6; } .col-4 { grid-column: span 4; } .col-8 { grid-column: span 8; }

    #portfolio { padding: 7rem 0; border-top: 1px solid var(--border); }
    .portfolio-filters { display: flex; justify-content: center; gap: 0.75rem; margin-bottom: 3rem; flex-wrap: wrap; }
    .filter-btn { font-size: 0.8rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; padding: 0.5rem 1.25rem; border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); transition: all 0.2s ease; }
    .filter-btn:hover { color: var(--text); border-color: var(--border-hover); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap: 1.5rem; }
    .portfolio-item { position: relative; border-radius: 10px; overflow: hidden; background: var(--surface); border: 1px solid var(--border); cursor: pointer; aspect-ratio: 4/3; }
    .portfolio-item img, .portfolio-item video { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
    .portfolio-item:hover img, .portfolio-item:hover video { transform: scale(1.03); }
    .portfolio-meta { position: absolute; inset: 0; background: linear-gradient(to top, rgba(3,7,18,0.9) 0%, rgba(3,7,18,0.2) 60%, transparent 100%); opacity: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 1.5rem; transition: opacity 0.3s ease; }
    .portfolio-item:hover .portfolio-meta { opacity: 1; }
    .portfolio-category { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 0.25rem; }
    .portfolio-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }
    .video-badge { position: absolute; top: 1rem; right: 1rem; background: rgba(3,7,18,0.75); border: 1px solid rgba(255,255,255,0.1); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2; }

    #process { padding: 7rem 0; background: var(--surface); border-top: 1px solid var(--border); }
    .pipeline-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 2rem; }
    .step-num { font-family: var(--font-display); font-size: 3rem; font-weight: 800; letter-spacing: -0.05em; color: rgba(99,102,241,0.15); line-height: 1; margin-bottom: 1rem; }
    .step-title { font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.75rem; }
    .step-desc { color: var(--text-muted); font-size: 0.9rem; }

    #comparison { padding: 7rem 0; border-top: 1px solid var(--border); }
    .comp-table-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-top: 3rem; }
    .comp-table { width: 100%; border-collapse: collapse; text-align: left; }
    .comp-table th, .comp-table td { padding: 1.25rem 2rem; border-bottom: 1px solid var(--border); }
    .comp-table th { background: rgba(255,255,255,0.01); font-size: 0.85rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
    .comp-table td { font-size: 0.95rem; }
    .comp-table td:first-child { font-weight: 600; }
    .comp-highlight { color: var(--accent); font-weight: 500; }

    #engagement { padding: 7rem 0; border-top: 1px solid var(--border); }
    .pricing-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 2rem; margin-top: 3rem; }
    .pricing-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem; display: flex; flex-direction: column; position: relative; }
    .pricing-card.popular { border-color: var(--accent); box-shadow: 0 4px 30px rgba(99,102,241,0.1); }
    .pricing-card.popular::before { content: 'Recommended'; position: absolute; top: -12px; right: 2rem; background: var(--accent); color: #fff; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 0.25rem 0.75rem; border-radius: 9999px; }
    .pricing-tier { font-family: var(--font-display); font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
    .pricing-desc { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1.5rem; min-height: 45px; }
    .pricing-features { list-style: none; margin: 1.5rem 0; flex-grow: 1; }
    .pricing-features li { display: flex; align-items: flex-start; gap: 0.75rem; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.75rem; }
    .pricing-features svg { color: var(--accent); flex-shrink: 0; margin-top: 0.2rem; }

    #faq { padding: 7rem 0; border-top: 1px solid var(--border); }
    .faq-container { max-width: 800px; margin: 3rem auto 0; }
    .faq-item { border-bottom: 1px solid var(--border); }
